<!DOCTYPE html>
<html lang="pt-PT">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crew Assistant — Equipa de Agentes IA</title>
  <link rel="icon" href="{{ url_for('static', filename='img/logo.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

  <div class="layout">

    <aside class="sidebar">

      <button id="newChatBtn" class="new-chat-btn">
        + Nova Conversa
      </button>

      <div id="chatHistory" class="chat-history">
        <!-- Conversas antigas -->
      </div>

    </aside>

    <div class="app">

      <header class="app__header">

        <div class="header__top">

          <div class="header__brand">

            <img src="{{ url_for('static', filename='img/logo.png') }}" class="logo" alt="Crew Assistant">

            <div>

              <p class="header__eyebrow">
                EQUIPA DE AGENTES
              </p>

              <h1>Crew Assistant</h1>

            </div>

          </div>

          <button id="themeToggle" class="theme-toggle">
            <span id="themeIcon">🌙</span>
          </button>

        </div>

        <div class="relay" id="relay">
          <div class="relay__track"></div>
          <div class="relay__progress" id="relayProgress"></div>

          <div class="relay__node" data-node="coordenador">
            <div class="relay__dot"></div>
            <span class="relay__label">Coordenador</span>
          </div>
          <div class="relay__node" data-node="pesquisador">
            <div class="relay__dot"></div>
            <span class="relay__label">Pesquisador</span>
          </div>
          <div class="relay__node" data-node="especialista">
            <div class="relay__dot"></div>
            <span class="relay__label">Especialista</span>
          </div>
          <div class="relay__node" data-node="redator">
            <div class="relay__dot"></div>
            <span class="relay__label">Redator</span>
          </div>
        </div>
      </header>

      <main class="chat" id="chat">
        <div class="chat__empty" id="chatEmpty">
          <p class="chat__empty-eyebrow">EM ESPERA</p>
          <p class="chat__empty-title">Envia uma mensagem para acionar a equipa</p>
          <p class="chat__empty-sub">Coordenador → Pesquisador → Especialista → Redator</p>
        </div>
      </main>

      <div class="attachments" id="attachmentsPreview"></div>

      <form class="composer" id="composer" autocomplete="off">
        <button type="button" class="composer__attach" id="attachBtn" title="Anexar imagens">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path
              d="M21.44 11.05L12.25 20.24C10.24 22.25 6.98 22.25 4.96 20.24C2.95 18.23 2.95 14.97 4.96 12.95L14.14 3.77C15.49 2.43 17.66 2.43 19 3.77C20.35 5.12 20.35 7.29 19 8.64L10.11 17.53C9.43 18.2 8.34 18.2 7.66 17.53C6.99 16.85 6.99 15.76 7.66 15.09L15.78 6.97"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <input type="file" id="fileInput" accept="image/*" multiple hidden />
        <input type="text" id="messageInput" class="composer__input"
          placeholder="Escreve a tua mensagem ou anexa imagens..." autocomplete="off" />
        <button type="submit" class="composer__send" id="sendBtn">
          <span>Enviar</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M4 12H20M20 12L14 6M20 12L14 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </form>

    </div>

  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
