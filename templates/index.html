<!DOCTYPE html>
<html lang="pt-PT">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="title">Crew Assistant — Equipa de Agentes IA</title>
  <link rel="icon" href="{{ url_for('static', filename='img/logo.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<div class="floating-logo">
    <img src="{{ url_for('static', filename='img/logo.png') }}"
         class="floating-logo-image"
         alt="Crew Assistant">
</div>

<body>

  <div class="layout">

    <aside class="sidebar">

      <button data-i18n="new_chat" id="newChatBtn" class="new-chat-btn">
        + Nova Conversa
      </button>

      <div id="chatHistory" class="chat-history">
        <!-- Conversas antigas -->
      </div>

    </aside>

    <div class="app">

      <header class="app__header">

        <div class="header__top">

          <div class="header__brand">

            <div>

              <p data-i18n="sub_title" class="header__eyebrow">
                EQUIPA DE AGENTES
              </p>

              <h1>Crew Assistant</h1>

            </div>

          </div>

          <div class="header-actions">

            <div class="language-selector">

              <button id="languageButton">

                <img id="languageFlag" src="/static/img/flags/pt.svg">

                <span id="languageCode">
                  PT
                </span>

              </button>

              <div id="languageMenu" class="language-menu">

                <div class="language-item" data-lang="pt">
                  <img src="/static/img/flags/pt.svg">
                  Português
                </div>

                <div class="language-item" data-lang="en">
                  <img src="/static/img/flags/en.svg">
                  English
                </div>

              </div>

            </div>

            <button id="themeToggle" class="theme-toggle">
              <span id="themeIcon">🌙</span>
            </button>

          </div>
        </div>

        <div class="relay" id="relay">
          <div class="relay__track"></div>
          <div class="relay__progress" id="relayProgress"></div>

          <div class="relay__node" data-node="coordenador">
            <div class="relay__dot"></div>
            <span class="relay__label" data-i18n="coordinator">Coordenador</span>
          </div>
          <div class="relay__node" data-node="pesquisador">
            <div class="relay__dot"></div>
            <span class="relay__label" data-i18n="researcher">Pesquisador</span>
          </div>
          <div class="relay__node" data-node="especialista">
            <div class="relay__dot"></div>
            <span class="relay__label" data-i18n="expert">Especialista</span>
          </div>
          <div class="relay__node" data-node="redator">
            <div class="relay__dot"></div>
            <span class="relay__label" data-i18n="copywriter">Redator</span>
          </div>
        </div>
      </header>

      <main class="chat" id="chat">
        <div class="chat__empty" id="chatEmpty">
          <p class="chat__empty-eyebrow" data-i18n="onhold">EM ESPERA</p>
          <p class="chat__empty-title" data-i18n="empty-title">Envia uma mensagem para acionar a equipa</p>
          <p class="chat__empty-sub" data-i18n="empty-sub">Coordenador → Pesquisador → Especialista → Redator</p>
        </div>
        <div class="chat__messages" id="chatMessages"></div>
      </main>

      <div class="attachments" id="attachmentsPreview"></div>

      <div class="reply-preview" id="replyPreview" hidden>
        <div class="reply-preview__content">
          <p class="reply-preview__label">A responder a</p>
          <p class="reply-preview__text" id="replyPreviewText"></p>
        </div>
        <button type="button" class="reply-preview__close" id="replyPreviewClose"
          aria-label="Cancelar resposta">×</button>
      </div>

      <form class="composer" id="composer" autocomplete="off">
        <button type="button" class="composer__attach" id="attachBtn" title="Anexar imagens">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path
              d="M21.44 11.05L12.25 20.24C10.24 22.25 6.98 22.25 4.96 20.24C2.95 18.23 2.95 14.97 4.96 12.95L14.14 3.77C15.49 2.43 17.66 2.43 19 3.77C20.35 5.12 20.35 7.29 19 8.64L10.11 17.53C9.43 18.2 8.34 18.2 7.66 17.53C6.99 16.85 6.99 15.76 7.66 15.09L15.78 6.97"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <input type="file" id="fileInput" accept="image/*" multiple hidden />
        <input type="text" id="messageInput" class="composer__input" data-i18n-placeholder="placeholder"
          autocomplete="off" />
        <button type="submit" class="composer__send" id="sendBtn">
          <span data-i18n="send">Enviar</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M4 12H20M20 12L14 6M20 12L14 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </form>

    </div>

  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
